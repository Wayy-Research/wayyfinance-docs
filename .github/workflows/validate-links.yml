# Validate internal markdown links on PRs
# Catches broken references before they land in main

name: Validate Links

on:
  pull_request:
    paths:
      - "**/*.md"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate internal links
        run: python scripts/validate-links.py
